<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="default"/>
<meta name="apple-mobile-web-app-title" content="캘린더"/>
<meta name="theme-color" content="#1a73e8"/>
<title>캘린더 · 할 일</title>
<link rel="manifest" href="manifest.json"/>
<link rel="apple-touch-icon" href="icon-192.png"/>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --font:'DM Sans',sans-serif;
  --bg:#f8f9fa;--surface:#fff;--surface2:#f1f3f5;
  --border:#e9ecef;--border2:#dee2e6;
  --text:#212529;--text2:#6c757d;--text3:#adb5bd;
  --accent:#1a73e8;--accent-light:#e8f0fe;
  --today:#1a73e8;--holiday:#e8425a;--holiday-bg:#fff0f2;
  --shadow2:0 4px 16px rgba(0,0,0,0.10);
}
html,body{height:100%;font-family:var(--font);background:var(--bg);color:var(--text);font-size:14px;}

/* ── LOGIN SCREEN ── */
.login-screen{position:fixed;inset:0;background:linear-gradient(135deg,#1a73e8 0%,#0d47a1 100%);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:1000;gap:24px;}
.login-logo{display:flex;flex-direction:column;align-items:center;gap:12px;}
.login-icon{width:72px;height:72px;background:rgba(255,255,255,0.2);border-radius:20px;display:flex;align-items:center;justify-content:center;}
.login-title{font-size:28px;font-weight:600;color:#fff;letter-spacing:-0.5px;}
.login-sub{font-size:15px;color:rgba(255,255,255,0.75);}
.google-btn{display:flex;align-items:center;gap:12px;background:#fff;border:none;border-radius:12px;padding:14px 28px;font-family:var(--font);font-size:15px;font-weight:500;color:#3c4043;cursor:pointer;box-shadow:0 4px 20px rgba(0,0,0,0.2);transition:transform .15s,box-shadow .15s;}
.google-btn:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(0,0,0,0.25);}
.google-btn:active{transform:translateY(0);}
.google-btn svg{flex-shrink:0;}
.login-note{font-size:12px;color:rgba(255,255,255,0.55);text-align:center;}
.hidden{display:none!important;}

/* ── APP SHELL ── */
.app{display:flex;height:100vh;overflow:hidden;}

/* SIDEBAR */
.sidebar{width:240px;min-width:240px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;padding:16px 0;overflow-y:auto;transition:transform .3s;}
.logo{display:flex;align-items:center;gap:8px;padding:6px 18px 18px;font-size:17px;font-weight:600;}
.logo-icon{width:26px;height:26px;background:var(--accent);border-radius:7px;display:flex;align-items:center;justify-content:center;}
.add-btn{margin:0 14px 18px;padding:9px 16px;background:var(--surface);border:1px solid var(--border2);border-radius:22px;font-family:var(--font);font-size:13px;font-weight:500;color:var(--text);cursor:pointer;display:flex;align-items:center;gap:8px;box-shadow:var(--shadow2);transition:box-shadow .2s;}
.add-btn:hover{box-shadow:0 6px 18px rgba(0,0,0,0.13);}
.mini-cal{padding:0 10px 14px;}
.mini-hdr{display:flex;align-items:center;justify-content:space-between;padding:2px 6px;margin-bottom:6px;}
.mini-hdr-title{font-size:13px;font-weight:500;}
.mnav{background:none;border:none;cursor:pointer;color:var(--text2);width:24px;height:24px;border-radius:50%;font-size:15px;display:flex;align-items:center;justify-content:center;}
.mnav:hover{background:var(--surface2);}
.mgrid{display:grid;grid-template-columns:repeat(7,1fr);}
.mdow{text-align:center;font-size:11px;color:var(--text2);padding:3px 0;font-weight:500;}
.mday{text-align:center;font-size:12px;padding:3px;cursor:pointer;border-radius:50%;aspect-ratio:1;display:flex;align-items:center;justify-content:center;color:var(--text);transition:background .12s;}
.mday:hover{background:var(--surface2);}
.mday.other{color:var(--text3);}
.mday.today{background:var(--today);color:#fff;font-weight:600;}
.mday.sel{background:#d2e3fc;color:var(--accent);font-weight:600;}
.mday.hday,.mday.sun{color:var(--holiday);}
.sec-label{padding:10px 18px 4px;font-size:11px;font-weight:600;color:var(--text2);letter-spacing:.07em;text-transform:uppercase;}
.cal-row{display:flex;align-items:center;gap:9px;padding:5px 18px;font-size:13px;}
.dot{width:11px;height:11px;border-radius:50%;flex-shrink:0;}
.holiday-legend{display:flex;align-items:center;gap:6px;padding:6px 18px;font-size:12px;color:var(--holiday);}
.holiday-dot{width:8px;height:8px;border-radius:50%;background:var(--holiday);}
.sync-status{padding:6px 18px;font-size:11px;color:var(--text3);display:flex;align-items:center;gap:4px;}
.sync-dot{width:6px;height:6px;border-radius:50%;background:var(--text3);}
.sync-dot.ok{background:#34a853;}
.sync-dot.loading{background:#fbbc04;animation:pulse 1s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.4;}}

/* USER INFO */
.user-area{margin-top:auto;padding:12px 18px;border-top:1px solid var(--border);display:flex;align-items:center;gap:10px;}
.user-avatar{width:32px;height:32px;border-radius:50%;object-fit:cover;flex-shrink:0;}
.user-avatar-placeholder{width:32px;height:32px;border-radius:50%;background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;flex-shrink:0;}
.user-info{flex:1;min-width:0;}
.user-name{font-size:12px;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.user-email{font-size:11px;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.logout-btn{background:none;border:none;cursor:pointer;color:var(--text3);font-size:11px;padding:4px;border-radius:4px;transition:color .12s;}
.logout-btn:hover{color:var(--holiday);}

/* MAIN */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.main-hdr{display:flex;align-items:center;gap:10px;padding:10px 18px;border-bottom:1px solid var(--border);background:var(--surface);}
.menu-btn{display:none;background:none;border:none;cursor:pointer;color:var(--text2);padding:4px;border-radius:6px;}
.nbtn{background:none;border:1px solid var(--border2);border-radius:50%;width:30px;height:30px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text2);font-size:15px;transition:background .12s;}
.nbtn:hover{background:var(--surface2);}
.tbtn{padding:5px 14px;background:var(--surface);border:1px solid var(--border2);border-radius:6px;font-family:var(--font);font-size:13px;font-weight:500;color:var(--text);cursor:pointer;}
.tbtn:hover{background:var(--surface2);}
.main-title{font-size:19px;font-weight:400;flex:1;}
.vsw{display:flex;border:1px solid var(--border2);border-radius:7px;overflow:hidden;}
.vbtn{padding:5px 14px;background:none;border:none;font-family:var(--font);font-size:13px;font-weight:500;color:var(--text2);cursor:pointer;border-right:1px solid var(--border2);transition:background .12s,color .12s;}
.vbtn:last-child{border-right:none;}
.vbtn.active{background:var(--accent-light);color:var(--accent);}
.vbtn:hover:not(.active){background:var(--surface2);}

.content{flex:1;display:flex;overflow:hidden;}
.cal-area{flex:1;display:flex;flex-direction:column;overflow:hidden;}

/* MONTH */
.month-view{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.dow-row{display:grid;grid-template-columns:repeat(7,1fr);border-bottom:1px solid var(--border);}
.dow-cell{text-align:center;padding:7px;font-size:12px;font-weight:500;color:var(--text2);}
.dow-cell:first-child{color:var(--holiday);}
.month-grid{flex:1;display:grid;grid-template-columns:repeat(7,1fr);grid-auto-rows:1fr;overflow-y:auto;}
.mcell{border-right:1px solid var(--border);border-bottom:1px solid var(--border);padding:4px;background:var(--surface);cursor:pointer;min-height:90px;transition:background .12s;}
.mcell:hover{background:#fafbff;}
.mcell.other{background:var(--bg);}
.mcell.tc{background:#fffde7;}
.mcell.hc{background:var(--holiday-bg);}
.mcell.sc{background:#fff8f8;}
.dnum{font-size:12px;color:var(--text2);width:24px;height:24px;display:flex;align-items:center;justify-content:center;border-radius:50%;margin-bottom:1px;}
.dnum.rnum{color:var(--holiday);font-weight:500;}
.tc .dnum{background:var(--today);color:#fff;font-weight:600;}
.hname{font-size:10px;color:var(--holiday);font-weight:500;padding:0 2px 2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.chip{font-size:11px;padding:1px 5px;border-radius:3px;margin-bottom:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.chip.blue{background:#d2e3fc;color:#1a5dc8;}
.chip.green{background:#ceead6;color:#1e7e34;}
.chip.red{background:#fad2cf;color:#c5221f;}
.chip.amber{background:#feefc3;color:#c77400;}
.chip.purple{background:#e8d5fb;color:#6200ea;}

/* WEEK */
.week-view{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.wk-hdr{display:grid;grid-template-columns:52px repeat(7,1fr);border-bottom:1px solid var(--border);}
.wk-hdr-cell{text-align:center;padding:6px 2px;}
.wk-dow{font-size:11px;color:var(--text2);font-weight:500;}
.wk-dow.rdow{color:var(--holiday);}
.wk-dnum{font-size:19px;font-weight:300;color:var(--text2);width:36px;height:36px;display:flex;align-items:center;justify-content:center;border-radius:50%;margin:0 auto;}
.wk-dnum.today{background:var(--today);color:#fff;font-weight:600;}
.wk-dnum.rhday{color:var(--holiday);}
.wk-hlabel{font-size:10px;color:var(--holiday);font-weight:500;}
.wk-body{flex:1;overflow-y:auto;display:flex;}
.tcol{width:52px;flex-shrink:0;border-right:1px solid var(--border);}
.tslot{height:44px;padding:0 6px;font-size:11px;color:var(--text3);text-align:right;line-height:44px;}
.wk-days{flex:1;display:grid;grid-template-columns:repeat(7,1fr);}
.wk-dcol{border-right:1px solid var(--border);position:relative;}
.wk-dcol.rcol{background:#fff8f8;}
.hline{height:44px;border-bottom:1px solid var(--border);}
.wev{position:absolute;left:2px;right:2px;border-radius:3px;padding:2px 4px;font-size:11px;font-weight:500;overflow:hidden;}

/* DAY */
.day-view{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.day-hdr{padding:10px 18px;border-bottom:1px solid var(--border);display:flex;align-items:baseline;gap:10px;flex-wrap:wrap;}
.day-big{font-size:38px;font-weight:300;color:var(--accent);}
.day-big.rday{color:var(--holiday);}
.day-sub{font-size:13px;color:var(--text2);}
.day-hbadge{font-size:12px;color:var(--holiday);background:var(--holiday-bg);padding:2px 10px;border-radius:12px;font-weight:500;}
.day-body{flex:1;overflow-y:auto;display:flex;}
.day-tcol{width:52px;flex-shrink:0;border-right:1px solid var(--border);}
.day-mcol{flex:1;position:relative;}
.dhline{height:44px;border-bottom:1px solid var(--border);}
.dev{position:absolute;left:8px;right:8px;border-radius:4px;padding:3px 7px;font-size:12px;font-weight:500;}

/* TODO PANELS */
.todo-panels{width:300px;min-width:300px;border-left:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;background:var(--bg);}
.todo-panel{background:var(--surface);border-bottom:1px solid var(--border);display:flex;flex-direction:column;flex:1;overflow:hidden;min-height:0;}
.tp-hdr{padding:10px 14px 6px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.tp-title{font-size:13px;font-weight:600;display:flex;align-items:center;gap:6px;}
.tp-badge{font-size:11px;font-weight:500;padding:1px 7px;border-radius:10px;}
.tp-badge.month{background:#e8f0fe;color:#1a73e8;}
.tp-badge.week{background:#e6f4ea;color:#188038;}
.tp-badge.day{background:#fce8e6;color:#c5221f;}
.tp-add{display:flex;gap:5px;padding:0 10px 8px;flex-shrink:0;}
.tp-input{flex:1;border:1px solid var(--border2);border-radius:6px;padding:6px 8px;font-family:var(--font);font-size:12px;color:var(--text);background:var(--bg);outline:none;}
.tp-input:focus{border-color:var(--accent);background:#fff;}
.tp-btn{padding:6px 10px;border:none;border-radius:6px;font-family:var(--font);font-size:12px;font-weight:500;color:#fff;cursor:pointer;}
.tp-btn.month{background:#1a73e8;}
.tp-btn.week{background:#188038;}
.tp-btn.day{background:#c5221f;}
.tp-list{flex:1;overflow-y:auto;padding:2px 0 6px;}
.ti{display:flex;align-items:flex-start;gap:8px;padding:5px 14px;transition:background .12s;position:relative;}
.ti:hover{background:var(--surface2);}
.tichk{width:16px;height:16px;border:1.5px solid var(--border2);border-radius:50%;flex-shrink:0;margin-top:2px;display:flex;align-items:center;justify-content:center;transition:all .15s;cursor:pointer;}
.tichk.done,.tichk.gd,.tichk.rd{color:#fff;}
.tichk.done::after,.tichk.gd::after,.tichk.rd::after{content:'';width:3px;height:7px;border:1.5px solid #fff;border-top:none;border-left:none;transform:rotate(45deg) translateY(-1px);display:block;}
.tichk.done{background:var(--accent);border-color:var(--accent);}
.tichk.gd{background:#188038;border-color:#188038;}
.tichk.rd{background:#c5221f;border-color:#c5221f;}
.ti-body{flex:1;min-width:0;}
.titext{font-size:12px;color:var(--text);line-height:1.5;cursor:pointer;}
.ti.done-item .titext{text-decoration:line-through;color:var(--text3);}
.ti-actions{display:flex;align-items:center;gap:4px;flex-shrink:0;}
.sub-toggle{background:none;border:1px solid var(--border2);border-radius:4px;cursor:pointer;color:var(--text2);font-size:10px;padding:1px 5px;font-family:var(--font);transition:background .12s;white-space:nowrap;}
.sub-toggle.has-sub{border-color:#c5221f;color:#c5221f;}
.tidel{background:none;border:none;cursor:pointer;color:var(--text3);font-size:13px;padding:0 2px;opacity:0;transition:opacity .12s;}
.ti:hover .tidel{opacity:1;}
.sub-list{margin:4px 0 4px 24px;border-left:2px solid #fad2cf;padding-left:8px;display:flex;flex-direction:column;gap:2px;}
.sub-item{display:flex;align-items:center;gap:6px;padding:2px 0;}
.sub-chk{width:13px;height:13px;border:1.5px solid var(--border2);border-radius:3px;flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;}
.sub-chk.done{background:#c5221f;border-color:#c5221f;}
.sub-chk.done::after{content:'';width:3px;height:6px;border:1.5px solid #fff;border-top:none;border-left:none;transform:rotate(45deg) translateY(-1px);display:block;}
.sub-text{font-size:11px;color:var(--text2);flex:1;}
.sub-text.done{text-decoration:line-through;color:var(--text3);}
.sub-del{background:none;border:none;cursor:pointer;color:var(--text3);font-size:11px;padding:0 2px;opacity:0;}
.sub-item:hover .sub-del{opacity:1;}
.sub-add-row{display:flex;gap:4px;margin-top:4px;}
.sub-inp{flex:1;border:1px solid var(--border2);border-radius:4px;padding:4px 6px;font-family:var(--font);font-size:11px;color:var(--text);background:var(--bg);outline:none;}
.sub-inp:focus{border-color:#c5221f;background:#fff;}
.sub-add-btn{padding:4px 8px;background:#c5221f;color:#fff;border:none;border-radius:4px;font-family:var(--font);font-size:11px;cursor:pointer;}
.sub-progress{font-size:10px;color:var(--text3);margin-top:1px;}
.empty-msg{padding:16px 14px;font-size:12px;color:var(--text3);text-align:center;}

/* MODAL */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.28);display:flex;align-items:center;justify-content:center;z-index:200;}
.modal{background:#fff;border-radius:12px;width:360px;box-shadow:0 12px 40px rgba(0,0,0,.18);max-width:90vw;}
.mhdr{padding:18px 18px 12px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;}
.mhdr-title{font-size:15px;font-weight:500;}
.mclose{background:none;border:none;cursor:pointer;font-size:17px;color:var(--text2);padding:2px 6px;}
.mbody{padding:14px 18px;}
.fl{margin-bottom:12px;}
.fl label{font-size:12px;font-weight:500;color:var(--text2);display:block;margin-bottom:3px;}
.fi{width:100%;padding:7px 10px;border:1px solid var(--border2);border-radius:7px;font-family:var(--font);font-size:13px;color:var(--text);outline:none;}
.fi:focus{border-color:var(--accent);}
.color-row{display:flex;gap:7px;margin-top:3px;}
.cdot{width:22px;height:22px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:transform .12s;}
.cdot.sel{box-shadow:0 0 0 2px var(--accent);transform:scale(1.15);}
.mftr{padding:10px 18px 14px;display:flex;justify-content:flex-end;gap:8px;}
.btn-c{padding:7px 14px;background:none;border:1px solid var(--border2);border-radius:7px;font-family:var(--font);font-size:13px;cursor:pointer;}
.btn-s{padding:7px 14px;background:var(--accent);color:#fff;border:none;border-radius:7px;font-family:var(--font);font-size:13px;font-weight:500;cursor:pointer;}

/* MOBILE */
@media(max-width:768px){
  .sidebar{position:fixed;left:0;top:0;bottom:0;z-index:100;transform:translateX(-100%);}
  .sidebar.open{transform:translateX(0);box-shadow:4px 0 20px rgba(0,0,0,0.15);}
  .menu-btn{display:flex;}
  .todo-panels{display:none;}
  .main-title{font-size:15px;}
  .vsw .vbtn{padding:5px 10px;font-size:12px;}
  .overlay{position:fixed;inset:0;background:rgba(0,0,0,0.3);z-index:99;display:none;}
  .overlay.show{display:block;}
  .mcell{min-height:60px;}
}
@media(max-width:480px){
  .vsw .vbtn{padding:5px 8px;font-size:11px;}
  .main-hdr{padding:8px 12px;gap:6px;}
  .tbtn{padding:5px 10px;font-size:12px;}
}
</style>
</head>
<body>

<!-- 오버레이 (모바일) -->
<div class="overlay" id="overlay" onclick="closeSidebar()"></div>

<!-- 로그인 화면 -->
<div class="login-screen" id="login-screen">
  <div class="login-logo">
    <div class="login-icon">
      <svg width="36" height="36" viewBox="0 0 36 36" fill="none">
        <rect x="4" y="4" width="28" height="28" rx="6" stroke="white" stroke-width="2"/>
        <path d="M4 13h28" stroke="white" stroke-width="2"/>
        <path d="M12 4v9M24 4v9" stroke="white" stroke-width="2" stroke-linecap="round"/>
        <path d="M10 21h6M10 26h10" stroke="white" stroke-width="2" stroke-linecap="round"/>
      </svg>
    </div>
    <div class="login-title">캘린더 · 할 일</div>
    <div class="login-sub">PC와 폰에서 함께 쓰는 나만의 캘린더</div>
  </div>
  <button class="google-btn" onclick="signInWithGoogle()">
    <svg width="20" height="20" viewBox="0 0 48 48">
      <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
      <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
      <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
      <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
    </svg>
    Google 계정으로 시작하기
  </button>
  <div class="login-note">구글 계정으로 로그인하면 PC와 폰이<br>자동으로 실시간 동기화됩니다</div>
</div>

<!-- 앱 본체 -->
<div class="app hidden" id="app">
  <div class="sidebar" id="sidebar">
    <div class="logo">
      <div class="logo-icon"><svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M7 1v12M1 7h12" stroke="#fff" stroke-width="1.8" stroke-linecap="round"/></svg></div>
      캘린더
    </div>

const firebaseConfig = {

const app = initializeApp(firebaseConfig);

const DK=['일','월','화','수','목','금','토'];
const MK=['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
let today=new Date(), cur=new Date(today), miniD=new Date(today);
let view='month', events=[], todos=[], selColor='blue', holidays={};
let expandedSubs=new Set();
let currentUser=null;
let unsubscribe=null;

// ── helpers ──
function dk(d){return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;}
function tk(){return dk(today);}
function wkStart(d){const r=new Date(d);r.setDate(r.getDate()-r.getDay());return r;}
function wkKey(d){return dk(wkStart(d));}
function moKey(d){return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function isH(s){return !!holidays[s];}
function getHN(s){return holidays[s]?holidays[s].join(', '):''}

// ── auth ──
window.signInWithGoogle = async function(){
  const provider = new GoogleAuthProvider();
  try{ await signInWithPopup(auth, provider); }
  catch(e){ console.error(e); }
};
window.logout = async function(){
  if(unsubscribe) unsubscribe();
  await signOut(auth);
  events=[]; todos=[];
};

onAuthStateChanged(auth, async (user) => {
  if(user){
    currentUser = user;
    document.getElementById('login-screen').classList.add('hidden');
    document.getElementById('app').classList.remove('hidden');
    renderUserArea(user);
    subscribeToData(user.uid);
  } else {
    currentUser = null;
    document.getElementById('login-screen').classList.remove('hidden');
    document.getElementById('app').classList.add('hidden');
  }
});

function renderUserArea(user){
  const area = document.getElementById('user-area');
  const initial = user.displayName ? user.displayName[0].toUpperCase() : '?';
  area.innerHTML = `
    ${user.photoURL
      ? `<img class="user-avatar" src="${user.photoURL}" alt=""/>`
      : `<div class="user-avatar-placeholder">${initial}</div>`}
    <div class="user-info">
      <div class="user-name">${esc(user.displayName||'사용자')}</div>
      <div class="user-email">${esc(user.email||'')}</div>
    </div>
    <button class="logout-btn" onclick="logout()" title="로그아웃">⏻</button>
  `;
}

// ── Firestore 실시간 동기화 ──
function subscribeToData(uid){
  if(unsubscribe) unsubscribe();
  const ref = doc(db, 'users', uid);
  unsubscribe = onSnapshot(ref, (snap) => {
    if(snap.exists()){
      const data = snap.data();
      events = data.events || [];
      todos = data.todos || [];
    } else {
      events = []; todos = [];
    }
    render(); renderTodos();
  });
}

async function saveData(){
  if(!currentUser) return;
  try{
    await setDoc(doc(db,'users',currentUser.uid), {events, todos}, {merge:true});
  } catch(e){ console.error('저장 실패',e); }
}

// ── holidays ──
async function loadHolidays(){
  try{
    const res=await fetch('https://holidays.hyunbin.page/basic.json');
    if(!res.ok) throw new Error();

      '2025-10-03':['개천절'],'2025-10-06':['추석'],'2025-10-09':['한글날'],'2025-12-25':['기독탄신일'],
      '2026-01-01':['새해'],'2026-01-29':['설날'],'2026-03-01':['삼일절'],'2026-03-02':['삼일절 대체공휴일'],
      '2026-05-05':['어린이날'],'2026-05-24':['부처님 오신 날'],'2026-06-06':['현충일'],
      '2026-08-15':['광복절'],'2026-09-25':['추석'],'2026-10-03':['개천절'],
      '2026-10-09':['한글날'],'2026-12-25':['기독탄신일'],
      '2027-01-01':['새해'],
    };
    document.getElementById('sync-dot').className='sync-dot';
    document.getElementById('sync-text').textContent='기본 공휴일 사용 중';
  }
  render(); renderMini();
}

// ── mini cal ──
function renderMini(){
  const y=miniD.getFullYear(),m=miniD.getMonth();
  document.getElementById('mtitle').textContent=`${y}년 ${MK[m]}`;
  const first=new Date(y,m,1).getDay(),days=new Date(y,m+1,0).getDate();
  let h='';
  DK.forEach((d,i)=>h+=`<div class="mdow" style="${i===0?'color:var(--holiday);':''}">${d}</div>`);
  for(let i=0;i<first;i++)h+=`<div class="mday other"></div>`;
  for(let d=1;d<=days;d++){
    const nd=new Date(y,m,d),key=dk(nd);
    const it=key===tk(),isSel=key===dk(cur)&&!it;
    const isSun=nd.getDay()===0,isHol=isH(key);
    h+=`<div class="mday${it?' today':isSel?' sel':''}${isSun||isHol?' hday':''}" onclick="jumpTo(${y},${m},${d})">${d}</div>`;
  }
  document.getElementById('mgrid').innerHTML=h;
}
window.mNav=function(d){miniD=new Date(miniD.getFullYear(),miniD.getMonth()+d,1);renderMini();}

window.jumpTo=function(y,m,d){cur=new Date(y,m,d);miniD=new Date(y,m,1);render();renderMini();renderTodos();closeSidebar();}
window.navigate=function(dir){
  if(view==='month')cur=new Date(cur.getFullYear(),cur.getMonth()+dir,1);
  else if(view==='week')cur=new Date(cur.getTime()+dir*7*86400000);
  else cur=new Date(cur.getTime()+dir*86400000);
  miniD=new Date(cur.getFullYear(),cur.getMonth(),1);
  render();renderMini();renderTodos();
}
window.goToday=function(){cur=new Date(today);miniD=new Date(today);render();renderMini();renderTodos();}
window.setView=function(v,btn){view=v;document.querySelectorAll('.vbtn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');render();renderTodos();}

// ── panel titles ──
function updatePanelTitles(){
  document.getElementById('panel-month-title').textContent=`${MK[cur.getMonth()]} 할 일`;
  const ws=wkStart(cur),we=new Date(ws);we.setDate(we.getDate()+6);
  document.getElementById('panel-week-title').textContent=`${ws.getMonth()+1}/${ws.getDate()}–${we.getMonth()+1}/${we.getDate()} 할 일`;
  const isTodaySel=dk(cur)===tk();
  document.getElementById('panel-day-title').textContent=isTodaySel?`오늘 (${cur.getMonth()+1}/${cur.getDate()}) 할 일`:`${cur.getMonth()+1}월 ${cur.getDate()}일 할 일`;
}

function render(){updatePanelTitles();if(view==='month')renderMonth();else if(view==='week')renderWeek();else renderDay();}

function renderMonth(){
  const y=cur.getFullYear(),m=cur.getMonth();
  document.getElementById('main-title').textContent=`${y}년 ${MK[m]}`;
  const first=new Date(y,m,1).getDay(),days=new Date(y,m+1,0).getDate();
  let h=`<div class="month-view"><div class="dow-row">${DK.map(d=>`<div class="dow-cell">${d}</div>`).join('')}</div><div class="month-grid">`;
  for(let i=0;i<first;i++)h+=`<div class="mcell other"><div class="dnum">${new Date(y,m,0).getDate()-first+1+i}</div></div>`;
  for(let d=1;d<=days;d++){
    const nd=new Date(y,m,d),key=dk(nd),it=key===tk();
    const isSun=nd.getDay()===0,isHol=isH(key),holName=getHN(key);
    const de=events.filter(e=>e.date===key);
    const dt=todos.filter(t=>t.scope==='day'&&t.date===key&&!t.done);
    let chips='';
    de.slice(0,2).forEach(e=>chips+=`<div class="chip ${e.color}">${e.time?e.time+' ':''}${esc(e.title)}</div>`);
    dt.slice(0,1).forEach(t=>chips+=`<div class="chip red">✓ ${esc(t.text)}</div>`);
    if(de.length+dt.length>3)chips+=`<div style="font-size:11px;color:var(--text2);padding:1px 3px;">+${de.length+dt.length-3}</div>`;
    h+=`<div class="mcell${it?' tc':isHol?' hc':isSun?' sc':''}" onclick="jumpTo(${y},${m},${d})">
      <div class="dnum${isSun||isHol?' rnum':''}">${d}</div>
      ${holName?`<div class="hname">${holName}</div>`:''}${chips}</div>`;
  }
  const rem=(7-((first+days)%7))%7;
  for(let i=1;i<=rem;i++)h+=`<div class="mcell other"><div class="dnum">${i}</div></div>`;
  document.getElementById('cal-area').innerHTML=h+`</div></div>`;
}

function renderWeek(){
  const ws=wkStart(cur),we=new Date(ws);we.setDate(we.getDate()+6);
  document.getElementById('main-title').textContent=`${ws.getFullYear()}년 ${ws.getMonth()+1}월 ${ws.getDate()}일 – ${we.getMonth()+1}월 ${we.getDate()}일`;
  let hd=`<div class="wk-hdr"><div style="width:52px;border-right:1px solid var(--border);"></div>`;
  for(let i=0;i<7;i++){
    const d=new Date(ws);d.setDate(d.getDate()+i);const key=dk(d);
    const it=key===tk(),isHol=isH(key),isSun=d.getDay()===0;
    hd+=`<div class="wk-hdr-cell"><div class="wk-dow${isSun||isHol?' rdow':''}">${DK[d.getDay()]}</div>
    <div class="wk-dnum${it?' today':isHol||isSun?' rhday':''}">${d.getDate()}</div>
    ${getHN(key)?`<div class="wk-hlabel">${getHN(key)}</div>`:''}</div>`;
  }
  hd+=`</div>`;
  let tc='';for(let h=0;h<24;h++)tc+=`<div class="tslot">${h}:00</div>`;
  let dc='';
  for(let i=0;i<7;i++){
    const d=new Date(ws);d.setDate(d.getDate()+i);const key=dk(d);
    const isHol=isH(key),isSun=d.getDay()===0;
    const de=events.filter(e=>e.date===key&&e.time);
    let lines='';for(let h=0;h<24;h++)lines+=`<div class="hline"></div>`;
    let ev='';de.forEach(e=>{const[hh,mm]=e.time.split(':').map(Number);ev+=`<div class="wev ${e.color}" style="top:${hh*44+mm*0.73}px;height:40px;">${e.time} ${esc(e.title)}</div>`;});
    dc+=`<div class="wk-dcol${isHol||isSun?' rcol':''}">${lines}${ev}</div>`;
  }
  document.getElementById('cal-area').innerHTML=`<div class="week-view">${hd}<div class="wk-body"><div class="tcol">${tc}</div><div class="wk-days">${dc}</div></div></div>`;
}

function renderDay(){
  const d=cur,key=dk(d),it=key===tk();
  const isHol=isH(key),isSun=d.getDay()===0,holName=getHN(key);
  document.getElementById('main-title').textContent=`${d.getFullYear()}년 ${d.getMonth()+1}월 ${d.getDate()}일 ${DK[d.getDay()]}요일`;
  const de=events.filter(e=>e.date===key&&e.time);
  let tc='';for(let h=0;h<24;h++)tc+=`<div class="tslot">${h}:00</div>`;
  let lines='';for(let h=0;h<24;h++)lines+=`<div class="dhline"></div>`;
  let ev='';de.forEach(e=>{const[hh,mm]=e.time.split(':').map(Number);ev+=`<div class="dev ${e.color}" style="top:${hh*44+mm*0.73}px;height:40px;">${e.time} ${esc(e.title)}</div>`;});
  document.getElementById('cal-area').innerHTML=`<div class="day-view">
    <div class="day-hdr">
      <div class="day-big${isHol||isSun?' rday':''}">${d.getDate()}</div>
      <div class="day-sub">${d.getFullYear()}년 ${d.getMonth()+1}월 · ${DK[d.getDay()]}요일${it?' · 오늘':''}</div>
      ${holName?`<div class="day-hbadge">🎌 ${holName}</div>`:''}
    </div>
    <div class="day-body"><div class="day-tcol">${tc}</div><div class="day-mcol" style="position:relative;">${lines}${ev}</div></div>
  </div>`;
}

// ── todos ──
function renderTodos(){
  updatePanelTitles();
  const curMo=moKey(cur),curWk=wkKey(cur),curDay=dk(cur);
  ['month','week'].forEach(scope=>{
    let items=scope==='month'?todos.filter(t=>t.scope==='month'&&t.moKey===curMo):todos.filter(t=>t.scope==='week'&&t.wkKey===curWk);
    const undone=items.filter(t=>!t.done),done=items.filter(t=>t.done);
    const ck=scope==='month'?'done':'gd';
    let h='';
    undone.forEach(t=>{h+=`<div class="ti"><div class="tichk" onclick="toggle('${t.id}')"></div><div class="ti-body"><div class="titext" onclick="toggle('${t.id}')">${esc(t.text)}</div></div><div class="ti-actions"><button class="tidel" onclick="del('${t.id}')">✕</button></div></div>`;});
    done.forEach(t=>{h+=`<div class="ti done-item"><div class="tichk ${ck}" onclick="toggle('${t.id}')"></div><div class="ti-body"><div class="titext" onclick="toggle('${t.id}')">${esc(t.text)}</div></div><div class="ti-actions"><button class="tidel" onclick="del('${t.id}')">✕</button></div></div>`;});
    if(!items.length)h=`<div class="empty-msg">${scope==='month'?MK[cur.getMonth()]+' 할 일이 없습니다':'이번 주 할 일이 없습니다'}</div>`;
    document.getElementById('list-'+scope).innerHTML=h;
    document.getElementById('badge-'+scope).textContent=undone.length;
  });

  const dayItems=todos.filter(t=>t.scope==='day'&&t.date===curDay);
  const undoneDay=dayItems.filter(t=>!t.done),doneDay=dayItems.filter(t=>t.done);
  let h='';
  function renderDayItem(t){
    const subs=t.subs||[];
    const subDone=subs.filter(s=>s.done).length;
    const hasSubs=subs.length>0;
    const isExp=expandedSubs.has(t.id);
    let subHtml='';
    if(isExp){
      let si='';
      subs.forEach(s=>{si+=`<div class="sub-item"><div class="sub-chk${s.done?' done':''}" onclick="toggleSub('${t.id}','${s.id}')"></div><span class="sub-text${s.done?' done':''}">${esc(s.text)}</span><button class="sub-del" onclick="delSub('${t.id}','${s.id}')">✕</button></div>`;});
      subHtml=`<div class="sub-list">${si}<div class="sub-add-row"><input class="sub-inp" id="sub-inp-${t.id}" placeholder="세부 항목 추가..." onkeydown="if(event.key==='Enter')addSub('${t.id}')"/><button class="sub-add-btn" onclick="addSub('${t.id}')">+</button></div></div>`;
    }
    return `<div class="ti${t.done?' done-item':''}">
      <div class="tichk${t.done?' rd':''}" onclick="toggle('${t.id}')"></div>
      <div class="ti-body">
        <div class="titext" onclick="toggle('${t.id}')">${esc(t.text)}</div>
        ${hasSubs&&isExp?`<div class="sub-progress">${subDone}/${subs.length} 완료</div>`:''}
        ${subHtml}
      </div>
      <div class="ti-actions">
        <button class="sub-toggle${hasSubs?' has-sub':''}" onclick="event.stopPropagation();toggleSubs('${t.id}')">${hasSubs?`${subDone}/${subs.length}`:'세부'}</button>
        <button class="tidel" onclick="del('${t.id}')">✕</button>
      </div>
    </div>`;
  }
  undoneDay.forEach(t=>h+=renderDayItem(t));
  doneDay.forEach(t=>h+=renderDayItem(t));
  if(!dayItems.length)h=`<div class="empty-msg">${dk(cur)===tk()?'오늘':'이 날'} 할 일이 없습니다</div>`;
  document.getElementById('list-day').innerHTML=h;
  document.getElementById('badge-day').textContent=undoneDay.length;
}

window.addTodo=function(scope){
  const inp=document.getElementById('inp-'+scope);
  const text=inp.value.trim();if(!text)return;
  todos.unshift({id:Date.now().toString(),text,done:false,scope,date:dk(cur),moKey:moKey(cur),wkKey:wkKey(cur),subs:[]});
  inp.value='';saveData();renderTodos();
}
window.toggle=function(id){const t=todos.find(x=>x.id===id);if(t){t.done=!t.done;saveData();renderTodos();}}
window.del=function(id){todos=todos.filter(x=>x.id!==id);expandedSubs.delete(id);saveData();renderTodos();}
window.toggleSubs=function(id){if(expandedSubs.has(id))expandedSubs.delete(id);else expandedSubs.add(id);renderTodos();}
window.addSub=function(tid){
  const inp=document.getElementById('sub-inp-'+tid);if(!inp)return;
  const text=inp.value.trim();if(!text)return;
  const t=todos.find(x=>x.id===tid);if(!t)return;
  if(!t.subs)t.subs=[];
  t.subs.push({id:Date.now().toString(),text,done:false});
  inp.value='';saveData();renderTodos();
  setTimeout(()=>{const el=document.getElementById('sub-inp-'+tid);if(el)el.focus();},50);
}
window.toggleSub=function(tid,sid){const t=todos.find(x=>x.id===tid);if(t&&t.subs){const s=t.subs.find(x=>x.id===sid);if(s){s.done=!s.done;saveData();renderTodos();}}}
window.delSub=function(tid,sid){const t=todos.find(x=>x.id===tid);if(t&&t.subs){t.subs=t.subs.filter(x=>x.id!==sid);saveData();renderTodos();}}

// ── event modal ──
window.openModal=function(){document.getElementById('ev-date').value=dk(cur);document.getElementById('ev-title').value='';document.getElementById('modal-bg').classList.remove('hidden');}
window.closeModal=function(){document.getElementById('modal-bg').classList.add('hidden');}
window.selC=function(el){selColor=el.dataset.c;document.querySelectorAll('.cdot').forEach(d=>d.classList.remove('sel'));el.classList.add('sel');}
window.saveEvent=function(){
  const title=document.getElementById('ev-title').value.trim(),date=document.getElementById('ev-date').value,time=document.getElementById('ev-time').value;
  if(!title||!date)return;
  events.push({id:Date.now().toString(),title,date,time,color:selColor});
  closeModal();saveData();render();
}

// ── sidebar mobile ──
window.toggleSidebar=function(){
  const sb=document.getElementById('sidebar'),ov=document.getElementById('overlay');
  sb.classList.toggle('open');ov.classList.toggle('show');
}
window.closeSidebar=function(){
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('overlay').classList.remove('show');
}

// ── init ──
loadHolidays();
renderMini();
render();
renderTodos();
</script>
